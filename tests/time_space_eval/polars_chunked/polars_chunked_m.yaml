services:
  app:
    build: ../../../
    volumes:
      - ../../../:/app
    working_dir: /app
    command: python polars_chunked.py "polars_chunked_m"
    deploy:
      resources:
        reservations:
          cpus: '1'
          memory: 2g
        limits:
          cpus: '1'
          memory: 2g