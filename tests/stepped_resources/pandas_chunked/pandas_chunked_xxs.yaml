services:
  app:
    build: ../../../
    volumes:
      - ../../../:/app
    working_dir: /app
    command: python pandas_chunked.py "pandas_chunked_xxs"
    deploy:
      resources:
        reservations:
          cpus: '0.25'
          memory: 0.25g
        limits:
          cpus: '0.25'
          memory: 0.25g