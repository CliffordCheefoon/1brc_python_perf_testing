services:
  app:
    build: ../../../
    volumes:
      - ../../../:/app
    working_dir: /app
    command: python polars_chunked.py "polars_chunked_xl"
    deploy:
      resources:
        reservations:
          cpus: '8'
          memory: 8g
        limits:
          cpus: '8'
          memory: 8g