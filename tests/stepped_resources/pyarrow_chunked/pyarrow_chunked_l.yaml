services:
  app:
    build: ../../../
    volumes:
      - ../../../:/app
    working_dir: /app
    command: python pyarrow_chunked.py "pyarrow_chunked_l"
    deploy:
      resources:
        reservations:
          cpus: '4'
          memory: 4g
        limits:
          cpus: '4'
          memory: 4g