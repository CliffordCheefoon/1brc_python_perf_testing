services:
  app:
    build: ../../../
    volumes:
      - ../../../:/app
    working_dir: /app
    command: python pyarrow_chunked.py "pyarrow_chunked_m"
    deploy:
      resources:
        reservations:
          cpus: '2'
          memory: 2g
        limits:
          cpus: '2'
          memory: 2g